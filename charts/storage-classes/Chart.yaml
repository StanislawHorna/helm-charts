apiVersion: v2
name: storage-classes
description: A Helm chart for provisioning local path and nfs storage classes.
type: application
version: 0.2.0
appVersion: "1.0.0"


dependencies:
  - name: csi-driver-nfs
    version: 4.13.1
    repository: "https://raw.githubusercontent.com/kubernetes-csi/csi-driver-nfs/master/charts"
    condition: csi-driver-nfs.enabled