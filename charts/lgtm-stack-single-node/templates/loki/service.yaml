apiVersion: v1
kind: Service
metadata:
  name: {{ include "lgtm-stack.componentSVC" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "lgtm-stack.componentAppName" . }}
spec:
  type: ClusterIP
  ports:
    - name: http
      protocol: TCP
      port: 3100
      targetPort: 3100
  selector:
    app: {{ include "lgtm-stack.componentAppName" . }}