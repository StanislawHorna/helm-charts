apiVersion: v1
kind: Service
metadata:
  name: {{ include "lgtm-stack.componentSVC" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "lgtm-stack.componentAppName" . }}
spec:
  type: ClusterIP
  ports:
    - name: http-query
      port: 3200
      targetPort: 3200
      protocol: TCP
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
  selector:
    app: {{ include "lgtm-stack.componentAppName" . }}