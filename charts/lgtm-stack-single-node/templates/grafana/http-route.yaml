{{ if .Values.grafana.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "lgtm-stack.name" . }}-grafana-http-route
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ .Values.grafana.gateway.gatewayName}}
      namespace: {{ .Values.grafana.gateway.gatewayNamespace }}
      sectionName: web
  hostnames:
    - {{ .Values.grafana.rootUrl | replace "https://" "" | replace "http://" "" }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      {{- if .Values.grafana.gateway.allowHttp }}
      backendRefs:
        - name: {{ include "lgtm-stack.componentSVC" . }}
          port: 3000
      {{- else }}
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            port: 443
            statusCode: 301
      {{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "lgtm-stack.name" . }}-grafana-https-route
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ .Values.grafana.gateway.gatewayName }}
      namespace: {{ .Values.grafana.gateway.gatewayNamespace }}
      sectionName: websecure
  hostnames:
    - {{ .Values.grafana.rootUrl | replace "https://" "" | replace "http://" "" }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "lgtm-stack.componentSVC" . }}
          port: 3000
{{ end }}