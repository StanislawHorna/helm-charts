apiVersion: v1
kind: Service
metadata:
  name: {{ include "lgtm-stack.componentSVC" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lgtm-stack.labels" . | nindent 4 }}
    app: grafana
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
  selector:
    app: grafana
