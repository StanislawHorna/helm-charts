apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lgtm-stack.componentDeployment" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lgtm-stack.labels" . | nindent 4 }}
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      volumes:
        - name: grafana-config
          configMap:
            name: {{ include "lgtm-stack.componentConfig" . }}
        - name: grafana-storage
          persistentVolumeClaim:
            claimName: {{ include "lgtm-stack.componentPVC" . }}
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
      {{- if .Values.grafana.provisionDashboards }}
        - name: grafana-dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: grafana-dashboards
          configMap:
            name: grafana-dashboards
      {{- end }}
      containers:
        - name: grafana
          image: "grafana/grafana:{{ .Values.grafana.image.tag }}"
          args:
            - --config=/etc/grafana/conf/custom.ini
          ports:
            - name: http
              containerPort: 3000
          resources:
            {{- toYaml .Values.grafana.resources | nindent 12 }}
          volumeMounts:
            - name: grafana-storage
              mountPath: /var/lib/grafana
            - name: grafana-config
              mountPath: /etc/grafana/conf
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
          {{- if .Values.grafana.provisionDashboards }}
            - name: grafana-dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: grafana-dashboards
              mountPath: /var/lib/grafana/dashboards
          {{- end }}
