apiVersion: v1
kind: Service
metadata:
  name: {{ include "lgtm-stack.componentSVC" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "lgtm-stack.componentAppName" . }}
spec:
  type: ClusterIP
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
    - name: grpc
      protocol: TCP
      port: 9095
      targetPort: 9095
  selector:
    app: {{ include "lgtm-stack.componentAppName" . }}
