apiVersion: v1
kind: Service
metadata:
  name: rust-fs-service
  namespace: {{ .Release.Namespace }}
  labels:
    app: rustfs
spec:
  type: ClusterIP
  ports:
    - name: api
      port: 9000
      targetPort: api
      protocol: TCP
    - name: console
      port: 9001
      targetPort: console
      protocol: TCP
  selector:
    app: rustfs
